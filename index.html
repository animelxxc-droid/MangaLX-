<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaLX - Yerli Anime & Manga Üssü</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="legal-notice">
        BİLGİLENDİRME: MangaLX, kullanıcı odaklı bir paylaşım platformudur. İçerik hakları tamamen yükleyiciye aittir. Telif hakkı bildirimi için iletişime geçiniz.
    </div>

    <header>
        <div class="logo">MangaLX</div>
        <div class="search-bar">
            <input type="text" placeholder="Manga veya Anime Ara...">
        </div>
        <div class="user-profile" id="userProfile">
            <img src="default-avatar.png" alt="Profil" id="profilePic">
        </div>
    </header>

    <main>
        <section class="section">
            <h2>Son Yüklenenler</h2>
            <div class="grid-horizontal" id="newestManga">
                <div class="manga-card-rect">
                    <img src="https://via.placeholder.com/300x150" alt="Manga">
                    <span>Rei no Striker - Bölüm 1</span>
                </div>
            </div>
        </section>

        <section class="section">
            <h2>En Sevilenler</h2>
            <div class="grid-square" id="popularManga">
                <div class="manga-card-square">
                    <img src="https://via.placeholder.com/150" alt="Manga">
                    <span>Manga Adı ⭐ 4.9</span>
                </div>
            </div>
        </section>

        <section class="section">
            <h2>Keşfet</h2>
            <div class="grid-explore" id="exploreGrid"></div>
        </section>
    </main>

    <div class="add-button" id="openUploadModal">+</div>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <h3>MangaLX'e Katıl</h3>
            <button class="btn-google">Google ile Giriş Yap</button>
            <hr>
            <input type="text" id="regName" placeholder="Kullanıcı Adı">
            <input type="password" id="regPass" placeholder="Şifre">
            <button class="btn-primary" onclick="registerUser()">Kayıt Ol / Giriş Yap</button>
        </div>
    </div>

</body>
<script src="script.js"></script>
</html>
